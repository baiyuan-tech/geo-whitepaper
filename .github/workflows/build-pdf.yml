      - name: Install XeLaTeX + Pandoc
        # English build needs neither CJK fonts nor xeCJK, but we reuse lmodern
        # + latex-recommended for consistency with the zh-TW job.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex texlive-fonts-recommended \
            texlive-latex-extra texlive-latex-recommended \
            lmodern \
            fonts-noto-color-emoji pandoc librsvg2-bin
          sudo fc-cache -fv > /dev/null

      - name: Verify XeLaTeX + lmodern presence (hard assert)
        run: |
          pandoc --version | head -2
          xelatex --version | head -1
          kpsewhich lmodern.sty > /dev/null || { echo "FATAL: lmodern.sty missing" >&2; exit 1; }
          echo "Prerequisites OK."

      - name: Concatenate Markdown chapters
