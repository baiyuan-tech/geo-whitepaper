name: Build Whitepaper PDF

on:
  push:
    branches: [main]
    paths:
      - 'zh-TW/**'
      - 'en/**'
      - 'README.md'
      - 'assets/pdf/**'
      - '.github/workflows/build-pdf.yml'
  pull_request:
    paths:
      - 'zh-TW/**'
      - 'en/**'
      - 'assets/pdf/**'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-zh-TW:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XeLaTeX + CJK fonts + Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex texlive-lang-chinese texlive-fonts-recommended \
            texlive-latex-extra fonts-noto-cjk fonts-noto-cjk-extra \
            fonts-noto-color-emoji pandoc librsvg2-bin
          sudo fc-cache -fv > /dev/null

      - name: Verify CJK font + xeCJK package presence (hard assert)
        run: |
          pandoc --version | head -2
          xelatex --version | head -1
          fc-list :lang=zh-tw | grep -qi noto || { echo "FATAL: no Noto CJK zh-tw" >&2; exit 1; }
          kpsewhich xeCJK.sty > /dev/null || { echo "FATAL: xeCJK.sty missing" >&2; exit 1; }
          echo "Prerequisites OK."

      - name: Concatenate Markdown chapters
        run: |
          chmod +x assets/pdf/concat.sh
          bash assets/pdf/concat.sh zh-TW > whitepaper-zh-TW.md
          wc -l whitepaper-zh-TW.md

      - name: Preprocess for XeLaTeX compatibility
        # Mermaid blocks → placeholder text (diagrams stay rendered on GitHub web).
        # Emoji stripped (CJK fonts don't cover them; decorative only).
        # Variation selectors and ZWJ removed (confuse fontspec).
        run: |
          python3 <<'PY'
          import re
          p = 'whitepaper-zh-TW.md'
          text = open(p, 'r', encoding='utf-8').read()

          text = re.sub(
            r'```mermaid\s*\n.*?\n```',
            '*[Mermaid diagram — see web version on GitHub]*',
            text, flags=re.DOTALL,
          )

          emoji_ranges = (
            (0x1F300, 0x1F64F), (0x1F680, 0x1F6FF), (0x1F700, 0x1F77F),
            (0x1F780, 0x1F7FF), (0x1F800, 0x1F8FF), (0x1F900, 0x1F9FF),
            (0x1FA00, 0x1FA6F), (0x1FA70, 0x1FAFF), (0x2600, 0x26FF),
            (0x2700, 0x27BF), (0x1F1E6, 0x1F1FF),
          )
          def is_emoji(cp):
              return any(lo <= cp <= hi for lo, hi in emoji_ranges)
          text = ''.join('' if is_emoji(ord(c)) else c for c in text)
          text = text.replace('\uFE0F', '').replace('\uFE0E', '').replace('\u200D', '')

          open(p, 'w', encoding='utf-8').write(text)
          print(f'[preprocess] {len(text)} chars after cleanup')
          PY

      - name: Build PDF via Pandoc + XeLaTeX (with pipefail + full log)
        id: pandoc
        run: |
          set -eo pipefail
          pandoc whitepaper-zh-TW.md \
            --pdf-engine=xelatex \
            --verbose \
            --metadata-file=assets/pdf/metadata-zh-TW.yaml \
            --toc --toc-depth=3 \
            --number-sections \
            --highlight-style=tango \
            -V documentclass=report \
            -V CJKmainfont="Noto Serif CJK TC" \
            -V CJKsansfont="Noto Sans CJK TC" \
            -V CJKmonofont="Noto Sans CJK TC" \
            -V mainfont="DejaVu Serif" \
            -V sansfont="DejaVu Sans" \
            -V monofont="DejaVu Sans Mono" \
            -V geometry:a4paper \
            -V geometry:margin=2.5cm \
            -V colorlinks=true \
            -V linkcolor=teal \
            -V urlcolor=blue \
            -V toccolor=black \
            -V lang=zh-TW \
            -o whitepaper-zh-TW.pdf 2>&1 | tee build.log
          echo "--- pandoc exit: success ---"
          ls -la whitepaper-zh-TW.pdf

      - name: Publish build.log to step summary (always)
        if: always()
        run: |
          {
            echo "## Pandoc Build Log"
            echo ""
            echo "Full log attached as artifact. Last 300 lines below:"
            echo ""
            echo '```'
            if [ -f build.log ]; then
              tail -300 build.log
            else
              echo "(build.log not produced — earlier step failed before pandoc ran)"
            fi
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "## Concatenated Markdown preview (first 60 lines)"
            echo ""
            echo '```markdown'
            if [ -f whitepaper-zh-TW.md ]; then
              head -60 whitepaper-zh-TW.md
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts (always, for debugging on failure too)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: whitepaper-zh-TW
          path: |
            whitepaper-zh-TW.pdf
            whitepaper-zh-TW.md
            build.log
          retention-days: 90
          if-no-files-found: warn

      - name: Attach PDF to Release
        if: github.event_name == 'release' && success()
        uses: softprops/action-gh-release@v2
        with:
          files: whitepaper-zh-TW.pdf
