name: Build Whitepaper PDF

on:
  push:
    branches: [main]
    paths:
      - 'zh-TW/**'
      - 'en/**'
      - 'README.md'
      - 'assets/pdf/**'
      - '.github/workflows/build-pdf.yml'
  pull_request:
    paths:
      - 'zh-TW/**'
      - 'en/**'
      - 'assets/pdf/**'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write  # required for action-gh-release to attach PDF to releases

jobs:
  build-zh-TW:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XeLaTeX + CJK fonts + Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex texlive-lang-chinese texlive-fonts-recommended \
            texlive-latex-extra fonts-noto-cjk fonts-noto-cjk-extra \
            fonts-noto-color-emoji pandoc librsvg2-bin
          sudo fc-cache -fv > /dev/null

      - name: Verify CJK font + xeCJK package presence (hard assert)
        run: |
          echo "--- pandoc ---"
          pandoc --version | head -2
          echo "--- xelatex ---"
          xelatex --version | head -1
          echo "--- CJK fonts (zh-tw) ---"
          if ! fc-list :lang=zh-tw | grep -qi noto; then
            echo "FATAL: No Noto CJK font with zh-tw coverage found" >&2
            fc-list :lang=zh-tw
            exit 1
          fi
          fc-list :lang=zh-tw family | sort -u | head -10
          echo "--- xeCJK.sty presence ---"
          if ! kpsewhich xeCJK.sty > /dev/null; then
            echo "FATAL: xeCJK.sty not found (texlive-lang-chinese missing?)" >&2
            exit 1
          fi
          kpsewhich xeCJK.sty

      - name: Install Mermaid filter + mermaid-cli (Chromium via puppeteer)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install mermaid-filter and configure --no-sandbox
        run: |
          npm install -g mermaid-filter @mermaid-js/mermaid-cli
          # MANDATORY on GitHub Actions — Chromium crashes without --no-sandbox
          echo '{"args":["--no-sandbox","--disable-setuid-sandbox"]}' > .puppeteer.json
          cat .puppeteer.json

      - name: Concatenate Markdown chapters
        run: |
          chmod +x assets/pdf/concat.sh
          bash assets/pdf/concat.sh zh-TW > whitepaper-zh-TW.md
          wc -l whitepaper-zh-TW.md

      - name: Build PDF via Pandoc + mermaid-filter + XeLaTeX
        env:
          MERMAID_FILTER_FORMAT: png
          PUPPETEER_CONFIG_FILE: ${{ github.workspace }}/.puppeteer.json
        run: |
          set -e
          pandoc whitepaper-zh-TW.md \
            --filter mermaid-filter \
            --pdf-engine=xelatex \
            --metadata-file=assets/pdf/metadata-zh-TW.yaml \
            --toc --toc-depth=3 \
            --number-sections \
            --highlight-style=tango \
            -V documentclass=report \
            -V CJKmainfont="Noto Serif CJK TC" \
            -V CJKsansfont="Noto Sans CJK TC" \
            -V CJKmonofont="Noto Sans CJK TC" \
            -V mainfont="DejaVu Serif" \
            -V sansfont="DejaVu Sans" \
            -V monofont="DejaVu Sans Mono" \
            -V geometry:a4paper \
            -V geometry:margin=2.5cm \
            -V colorlinks=true \
            -V linkcolor=teal \
            -V urlcolor=blue \
            -V toccolor=black \
            -V lang=zh-TW \
            -o whitepaper-zh-TW.pdf 2>&1 | tail -120
          ls -la whitepaper-zh-TW.pdf

      - name: Upload PDF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: whitepaper-zh-TW
          path: |
            whitepaper-zh-TW.pdf
            whitepaper-zh-TW.md
          retention-days: 90
          if-no-files-found: warn

      - name: Attach PDF to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: whitepaper-zh-TW.pdf
