              echo ""
              echo "## Concatenated Markdown preview (first 60 lines)"
              echo '```markdown'
              [ -f whitepaper-ja.md ] && head -60 whitepaper-ja.md
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: whitepaper-ja
          path: |
            whitepaper-ja.pdf
            whitepaper-ja.md
            build.log
          retention-days: 90
          if-no-files-found: warn

      - name: Attach PDF to Release
        if: github.event_name == 'release' && success()
        uses: softprops/action-gh-release@v2
        with:
