            fi
            msg=$(printf '%s' "$err_line" | sed -e 's/%/%25/g' -e 's/\r/%0D/g' -e 's/:/%3A/g')
            echo "::error title=Pandoc PDF build failure (en)::${msg:0:500}"

            {
              echo "## Pandoc Build Log (en)"
              echo ""
              echo "First 50 lines that mention an error:"
              echo '```'
              grep -nE '^! |error|Error|fatal|FATAL|fontspec' build.log | head -50 || echo "(no error pattern matched)"
              echo '```'
              echo ""
