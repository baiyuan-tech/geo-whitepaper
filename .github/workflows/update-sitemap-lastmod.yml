name: Update sitemap lastmod from git history

# Writes each content file's most-recent git commit timestamp back into
# its YAML frontmatter as `last_modified_at`, which jekyll-sitemap then
# emits as <lastmod> in sitemap.xml. Needed because
# jekyll-last-modified-at is NOT on GitHub Pages' safe-mode plugin
# whitelist.

on:
  push:
    branches: [main]
    paths:
      - 'zh-TW/**.md'
      - 'en/**.md'
      - 'README.md'
      - '.github/workflows/update-sitemap-lastmod.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lastmod
  cancel-in-progress: false

jobs:
  update-lastmod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to derive per-file mtimes
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write last_modified_at into frontmatter
        run: |
          python3 <<'PY'
          import pathlib, re, subprocess, sys

          roots = ['zh-TW', 'en', 'README.md']
          changed = []

          def files():
              for r in roots:
                  p = pathlib.Path(r)
                  if p.is_file() and p.suffix == '.md':
                      yield p
                  elif p.is_dir():
                      for f in p.rglob('*.md'):
                          yield f

          for f in files():
              # Git log: most recent commit timestamp for this file, ISO 8601 UTC
              ts = subprocess.run(
                  ['git', 'log', '-1', '--format=%cI', '--', str(f)],
                  capture_output=True, text=True, check=True,
              ).stdout.strip()
              if not ts:
                  continue

              text = f.read_text(encoding='utf-8')
              if not text.startswith('---\n'):
                  print(f'[skip] {f}: no YAML frontmatter')
                  continue

              end = text.index('\n---\n', 4) + 1
              fm = text[4:end - 1]
              body = text[end + 4:]

              # Remove any prior last_modified_at line
              fm_clean = re.sub(r'^last_modified_at:.*\n?', '', fm, flags=re.M)
              # Append fresh value before frontmatter end
              new_fm = fm_clean.rstrip('\n') + f'\nlast_modified_at: {ts}\n'

              new_text = '---\n' + new_fm + '---\n' + body
              if new_text != text:
                  f.write_text(new_text, encoding='utf-8')
                  changed.append(str(f))
                  print(f'[set]  {f}  last_modified_at: {ts}')
              else:
                  print(f'[same] {f}')

          if changed:
              pathlib.Path('/tmp/changed_files.txt').write_text('\n'.join(changed))
          PY

      - name: Commit changes (if any)
        run: |
          if ! git diff --quiet; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(sitemap): sync last_modified_at from git history [skip ci]" \
                       -m "Auto-updated by .github/workflows/update-sitemap-lastmod.yml so that" \
                       -m "jekyll-sitemap emits accurate <lastmod> values."
            git push
          else
            echo "No frontmatter changes — all files already have correct last_modified_at."
          fi
