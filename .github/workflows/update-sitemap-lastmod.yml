name: Update sitemap lastmod from git history

# Writes each content file's most-recent git commit timestamp back into
# its YAML frontmatter as `last_modified_at`, which jekyll-sitemap then
# emits as <lastmod> in sitemap.xml. Needed because
# jekyll-last-modified-at is NOT on GitHub Pages' safe-mode plugin
# whitelist.

on:
  push:
    branches: [main]
    paths:
      - 'zh-TW/**.md'
      - 'en/**.md'
      - 'README.md'
      - '.github/workflows/update-sitemap-lastmod.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lastmod
  cancel-in-progress: false

jobs:
  update-lastmod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to derive per-file mtimes
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write last_modified_at + sitemap hints into frontmatter
        run: |
          python3 <<'PY'
          import pathlib, re, subprocess

          roots = ['zh-TW', 'en', 'README.md']
          changed = []

          # jekyll-sitemap DOES NOT honor _config.yml defaults for changefreq/
          # priority, so we write the full sitemap hint block directly to each
          # file's frontmatter. Classification by file path:
          def sitemap_hints(path: pathlib.Path) -> dict:
              p = str(path).replace('\\', '/')
              if p == 'README.md':
                  return {'changefreq': 'weekly', 'priority': 1.0}
              # Appendices update less frequently
              if 'appendix-' in p:
                  return {'changefreq': 'monthly', 'priority': 0.6}
              # All chapters
              if p.startswith('zh-TW/') or p.startswith('en/'):
                  return {'changefreq': 'weekly', 'priority': 0.8}
              return {}

          def files():
              for r in roots:
                  p = pathlib.Path(r)
                  if p.is_file() and p.suffix == '.md':
                      yield p
                  elif p.is_dir():
                      for f in p.rglob('*.md'):
                          yield f

          for f in files():
              ts = subprocess.run(
                  ['git', 'log', '-1', '--format=%cI', '--', str(f)],
                  capture_output=True, text=True, check=True,
              ).stdout.strip()
              if not ts:
                  continue

              text = f.read_text(encoding='utf-8')
              if not text.startswith('---\n'):
                  print(f'[skip] {f}: no YAML frontmatter')
                  continue

              end = text.index('\n---\n', 4) + 1
              fm = text[4:end - 1]
              body = text[end + 4:]

              # Strip any existing managed blocks so we can re-write cleanly
              fm_clean = re.sub(r'^last_modified_at:.*\n?', '', fm, flags=re.M)
              # Remove prior sitemap: block (handles multi-line YAML mapping)
              fm_clean = re.sub(
                  r'^sitemap:\n(?:[ \t]+.*\n)+', '', fm_clean, flags=re.M
              )

              hints = sitemap_hints(f)
              add = f'\nlast_modified_at: {ts}\n'
              if hints:
                  add += 'sitemap:\n'
                  add += f"  changefreq: {hints['changefreq']}\n"
                  add += f"  priority: {hints['priority']}\n"

              new_fm = fm_clean.rstrip('\n') + add
              new_text = '---\n' + new_fm + '---\n' + body

              if new_text != text:
                  f.write_text(new_text, encoding='utf-8')
                  changed.append(str(f))
                  print(f'[set]  {f}  lastmod={ts}  hints={hints}')
              else:
                  print(f'[same] {f}')

          if changed:
              pathlib.Path('/tmp/changed_files.txt').write_text('\n'.join(changed))
          PY

      - name: Commit changes (if any)
        run: |
          if ! git diff --quiet; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(sitemap): sync last_modified_at + changefreq/priority from git history [skip ci]" \
                       -m "Auto-updated by .github/workflows/update-sitemap-lastmod.yml" \
                       -m "- last_modified_at: from 'git log -1 --format=%cI'" \
                       -m "- sitemap.changefreq/priority: by file path (README=1.0 weekly, chapters=0.8 weekly, appendices=0.6 monthly)"
            git push
          else
            echo "No frontmatter changes — all files already current."
          fi
