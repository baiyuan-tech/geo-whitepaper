name: Update sitemap lastmod from git history

# Writes each content file's most-recent git commit timestamp back into
# its YAML frontmatter as `last_modified_at`, which jekyll-sitemap then
# emits as <lastmod> in sitemap.xml. Needed because
# jekyll-last-modified-at is NOT on GitHub Pages' safe-mode plugin
# whitelist.

on:
  push:
    branches: [main]
    paths:
      - 'zh-TW/**.md'
      - 'en/**.md'
      - 'README.md'
      - '.github/workflows/update-sitemap-lastmod.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lastmod
  cancel-in-progress: false

jobs:
  update-lastmod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to derive per-file mtimes
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write last_modified_at into frontmatter (and clean up dead sitemap block)
        run: |
          python3 <<'PY'
          import pathlib, re, subprocess

          # Note: we previously experimented with writing a `sitemap:` block
          # carrying changefreq/priority. Verified against jekyll-sitemap
          # v1.4.0's shipped template that it emits ONLY <loc> and <lastmod>.
          # Google also ignores <priority> outright and treats <changefreq>
          # as only a weak hint. So we drop those hints entirely and just
          # maintain last_modified_at, which is the single signal that all
          # major search engines and AI crawlers actually consume.

          roots = ['zh-TW', 'en', 'README.md']
          changed = []

          def files():
              for r in roots:
                  p = pathlib.Path(r)
                  if p.is_file() and p.suffix == '.md':
                      yield p
                  elif p.is_dir():
                      for f in p.rglob('*.md'):
                          yield f

          for f in files():
              ts = subprocess.run(
                  ['git', 'log', '-1', '--format=%cI', '--', str(f)],
                  capture_output=True, text=True, check=True,
              ).stdout.strip()
              if not ts:
                  continue

              text = f.read_text(encoding='utf-8')
              if not text.startswith('---\n'):
                  print(f'[skip] {f}: no YAML frontmatter')
                  continue

              end = text.index('\n---\n', 4) + 1
              fm = text[4:end - 1]
              body = text[end + 4:]

              # Remove prior managed entries so we can rewrite cleanly
              fm_clean = re.sub(r'^last_modified_at:.*\n?', '', fm, flags=re.M)
              # Also strip any prior sitemap: block (dead code jekyll-sitemap ignores)
              fm_clean = re.sub(
                  r'^sitemap:\n(?:[ \t]+.*\n)+', '', fm_clean, flags=re.M
              )

              new_fm = fm_clean.rstrip('\n') + f'\nlast_modified_at: {ts}\n'
              new_text = '---\n' + new_fm + '---\n' + body

              if new_text != text:
                  f.write_text(new_text, encoding='utf-8')
                  changed.append(str(f))
                  print(f'[set]  {f}  last_modified_at: {ts}')
              else:
                  print(f'[same] {f}')

          if changed:
              pathlib.Path('/tmp/changed_files.txt').write_text('\n'.join(changed))
          PY

      - name: Commit changes (if any)
        run: |
          if ! git diff --quiet; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(sitemap): sync last_modified_at + changefreq/priority from git history [skip ci]" \
                       -m "Auto-updated by .github/workflows/update-sitemap-lastmod.yml" \
                       -m "- last_modified_at: from 'git log -1 --format=%cI'" \
                       -m "- sitemap.changefreq/priority: by file path (README=1.0 weekly, chapters=0.8 weekly, appendices=0.6 monthly)"
            git push
          else
            echo "No frontmatter changes — all files already current."
          fi
