abstract: |
  本書は百元科技（Baiyuan Technology）が 2024〜2026 年に開発した「百元 GEO
  Platform」の工程実践を記録する。百元 GEO Platform は生成エンジン最適化
  （Generative Engine Optimization、GEO）を対象とする SaaS システムであり、
  ブランドが ChatGPT、Claude、Gemini、Perplexity 等の生成 AI 応答内で正確かつ
  継続的に言及されることを目的とする。本書は 7 次元 AI シテーション率スコア
  リングアルゴリズム、AI ボット向けシャドウドキュメント（AXP）配信機構、
  Schema.org 3 層エンティティ知識グラフ、およびハルシネーションの自動検知・
  修復を行うクローズドループシステムを包括する。CC BY-NC 4.0 ライセンスで
  公開する。
