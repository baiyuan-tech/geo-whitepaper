# Jekyll config for GitHub Pages — https://baiyuan-tech.github.io/geo-whitepaper/
#
# Scope: minimal config to enable jekyll-sitemap + jekyll-seo-tag.
# We do NOT customize themes or layouts; the default Cayman theme renders
# the Markdown cleanly enough for a whitepaper repo.

title: "Baiyuan GEO Platform Whitepaper"
description: >-
  A technical whitepaper on building a SaaS for Generative Engine Optimization.
  Covers seven-dimension AI citation scoring, AXP shadow documents, Schema.org
  three-layer @id interlinking, and closed-loop hallucination remediation.
url: "https://baiyuan-tech.github.io"
baseurl: "/geo-whitepaper"
lang: zh-TW

# Author metadata surfaced by jekyll-seo-tag into <meta> and JSON-LD.
author:
  name: Vincent Lin
  email: services@baiyuan.io

# Organization info referenced by jekyll-seo-tag.
social:
  name: Baiyuan Technology
  links:
    - https://baiyuan.io
    - https://geo.baiyuan.io
    - https://www.linkedin.com/company/112980572
    - https://github.com/baiyuan-tech

# Plugins allowed on GitHub Pages (safe mode).
# Reference: https://pages.github.com/versions/
plugins:
  - jekyll-sitemap             # auto-generates /sitemap.xml from .md files
  - jekyll-seo-tag             # injects OG + Twitter + JSON-LD metadata
  - jekyll-feed                # /feed.xml for RSS readers (optional but cheap)
  - jekyll-redirect-from
  - jekyll-last-modified-at    # reads git commit mtime -> <lastmod> in sitemap
                               # (GitHub Pages whitelisted plugin)

# Files/dirs excluded from the generated site (they stay in repo, not published).
# Without this, Jekyll would try to render LICENSE, CITATION.cff, etc.
exclude:
  - CITATION.cff
  - LICENSE
  - FORMAT.md
  - Gemfile
  - Gemfile.lock
  - .github
  - .markdownlint.jsonc
  - .lycheeignore
  - assets/pdf       # PDF build scripts — not part of the published site
  - assets/social    # LinkedIn/social carousels — internal spec, not public
  - node_modules
  - vendor
  - '*.pdf'
  - README.original.md

# Sitemap hints per URL group. Google says it ignores <priority> and uses
# <changefreq> only as a weak hint, but Bing / Yandex / Baidu still read
# both. Costs nothing to emit them.
defaults:
  # Book chapters — updated most often; highest priority
  - scope:
      path: "zh-TW"
      type: pages
    values:
      sitemap:
        changefreq: weekly
        priority: 0.8
  - scope:
      path: "en"
      type: pages
    values:
      sitemap:
        changefreq: weekly
        priority: 0.8
  # Exclude-from-sitemap rules below must come AFTER the above or they get
  # overridden. Keeping them scoped to specific paths.
  - scope:
      path: "assets"
    values:
      sitemap: false
  # Google Search Console verification file — must stay reachable at its
  # canonical URL for verification, but shouldn't appear as an indexed page.
  - scope:
      path: "google*.html"
    values:
      sitemap: false
  # IndexNow key file (Bing / Yandex / Seznam / DuckDuckGo) — same rationale.
  - scope:
      path: "[a-f0-9]*.txt"
    values:
      sitemap: false

# Markdown engine
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  auto_ids: true
  toc_levels: 2..4

# Permalink shape — keep paths close to source file structure.
permalink: /:path/:basename:output_ext
